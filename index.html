<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tráfego Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
/* =========================================================
   TRÁFEGO TECH — Design System (Light Premium SaaS)
   ========================================================= */

:root {
  /* Brand — pulled from logo */
  --navy-900: #0a2342;
  --navy-800: #103a6c;
  --navy-700: #154e8a;
  --navy-500: #1d6fb8;
  --cyan-600: #0ea5c4;
  --cyan-500: #19b8d4;
  --cyan-400: #3dcce0;

  /* Neutrals — warm-cool premium whites */
  --bg: #f8fafc;
  --bg-elev: #ffffff;
  --bg-tint: #f1f5fa;
  --bg-deep: #eef3f9;
  --line: #e2e8f0;
  --line-strong: #cbd5e1;
  --ink-900: #0b1220;
  --ink-700: #28354a;
  --ink-500: #5a6a82;
  --ink-400: #7a8aa0;
  --ink-300: #a6b3c5;

  /* Accents */
  --accent: var(--navy-700);
  --accent-2: var(--cyan-500);
  --success: #10b981;
  --warn: #f59e0b;

  /* Type */
  --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* Effects */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 28px;
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
  --shadow-md: 0 4px 14px rgba(16,58,108,0.08), 0 2px 4px rgba(16,58,108,0.04);
  --shadow-lg: 0 24px 60px -20px rgba(16,58,108,0.25), 0 8px 24px -12px rgba(16,58,108,0.12);
  --shadow-glow: 0 0 0 6px rgba(25,184,212,0.12);

  /* Density */
  --space-unit: 1rem;
}

[data-density="compact"] { --space-unit: 0.78rem; }
[data-density="spacious"] { --space-unit: 1.25rem; }

[data-theme="dark"] {
  --bg: #07101e;
  --bg-elev: #0d192c;
  --bg-tint: #0a1525;
  --bg-deep: #060c17;
  --line: #1c2a44;
  --line-strong: #2a3a58;
  --ink-900: #e8eef9;
  --ink-700: #c1cbdc;
  --ink-500: #8294b1;
  --ink-400: #607496;
  --ink-300: #455a7d;
  --shadow-md: 0 4px 14px rgba(0,0,0,0.5);
  --shadow-lg: 0 24px 60px -20px rgba(0,0,0,0.7);
}

/* ---------- Base ---------- */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--ink-700);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: 0; background: none; }
img { max-width: 100%; display: block; }

h1, h2, h3, h4, h5 {
  font-family: var(--font-display);
  color: var(--ink-900);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin: 0;
}

p { margin: 0; }

/* ---------- Layout helpers ---------- */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
.container-narrow { max-width: 920px; margin: 0 auto; padding: 0 24px; }
.section { padding: clamp(64px, 9vw, 120px) 0; position: relative; }
.section-tight { padding: clamp(48px, 6vw, 80px) 0; }

.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--cyan-600);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.eyebrow::before {
  content: "";
  width: 24px; height: 1px;
  background: var(--cyan-500);
}

.section-title {
  font-size: clamp(2rem, 4.2vw, 3.4rem);
  font-weight: 600;
  letter-spacing: -0.03em;
  margin-top: 14px;
  max-width: 22ch;
}
.section-lede {
  margin-top: 18px;
  font-size: 1.075rem;
  color: var(--ink-500);
  max-width: 60ch;
  line-height: 1.6;
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 22px;
  border-radius: 999px;
  font-weight: 500;
  font-size: 0.95rem;
  letter-spacing: -0.01em;
  transition: transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
  white-space: nowrap;
  border: 1px solid transparent;
  position: relative;
}
.btn:active { transform: translateY(1px); }

.btn-primary {
  background: var(--ink-900);
  color: #fff;
}
.btn-primary:hover {
  background: var(--accent);
  box-shadow: 0 10px 24px -10px rgba(16,58,108,0.6);
}

.btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
}
.btn-accent:hover {
  box-shadow: 0 10px 28px -8px rgba(25,184,212,0.55);
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--ink-900);
  border-color: var(--line-strong);
}
.btn-ghost:hover {
  border-color: var(--ink-900);
  background: var(--bg-elev);
}

.btn-whatsapp {
  background: #25d366;
  color: #fff;
}
.btn-whatsapp:hover {
  background: #1fb955;
  box-shadow: 0 10px 24px -10px rgba(37,211,102,0.55);
}

.btn-sm { padding: 9px 16px; font-size: 0.85rem; }
.btn-lg { padding: 18px 28px; font-size: 1.02rem; }

/* ---------- Nav ---------- */
.nav {
  position: sticky;
  top: 0;
  z-index: 80;
  background: color-mix(in srgb, var(--bg) 78%, transparent);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  border-bottom: 1px solid transparent;
  transition: border-color .2s ease, background .2s ease;
}
.nav.scrolled { border-bottom-color: var(--line); }

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  height: 72px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: -0.03em;
  font-size: 1.05rem;
  color: var(--ink-900);
}
.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #fff center/contain no-repeat url("assets/logo.jpeg");
  border: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
}
.brand-text { display: inline-flex; gap: 4px; }
.brand-text .b { color: var(--navy-800); }
.brand-text .t { color: var(--cyan-600); }

.nav-links {
  display: flex;
  gap: 6px;
  list-style: none;
  margin: 0;
  padding: 0;
}
.nav-links a {
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 0.9rem;
  color: var(--ink-500);
  transition: color .15s, background .15s;
}
.nav-links a:hover { color: var(--ink-900); background: var(--bg-tint); }

@media (max-width: 820px) {
  .nav-links { display: none; }
}

/* ---------- Hero ---------- */
.hero {
  position: relative;
  padding: clamp(60px, 9vw, 110px) 0 clamp(50px, 7vw, 90px);
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.hero-bg::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, var(--line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, #000 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, #000 30%, transparent 80%);
  opacity: 0.6;
}
.hero-bg .glow {
  position: absolute;
  width: 580px; height: 580px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.55;
}
.hero-bg .glow.g1 { background: radial-gradient(circle, rgba(25,184,212,0.32), transparent 70%); top: -120px; left: -120px; }
.hero-bg .glow.g2 { background: radial-gradient(circle, rgba(21,78,138,0.22), transparent 70%); bottom: -150px; right: -120px; }

.hero-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 56px;
  align-items: center;
}
@media (max-width: 960px) {
  .hero-grid { grid-template-columns: 1fr; gap: 44px; }
}

.hero-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 6px 6px 14px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 0.82rem;
  color: var(--ink-700);
  box-shadow: var(--shadow-sm);
}
.hero-pill .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 4px rgba(16,185,129,0.18);
  animation: pulse-dot 1.8s infinite;
}
.hero-pill .tag {
  background: var(--bg-tint);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 10px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--ink-500);
}
@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
}

.hero h1.hero-headline {
  margin-top: 22px;
  font-size: clamp(2.6rem, 6.8vw, 5.4rem);
  font-weight: 800;
  line-height: 0.96;
  letter-spacing: -0.038em;
  color: var(--ink-900);
  display: flex;
  flex-direction: column;
  gap: 0.04em;
}
.hero-headline .line { display: block; }
.hero-headline .line-flip {
  display: inline-flex;
  align-items: baseline;
  flex-wrap: nowrap;
  gap: 0.08em;
  white-space: nowrap;
}
.hero-headline .flip-prefix {
  color: var(--ink-500);
  font-weight: 500;
  font-style: italic;
}
.hero-headline .flip-window {
  position: relative;
  display: inline-block;
  height: 1em;
  width: 4.6em;
  vertical-align: baseline;
  overflow: hidden;
}
.hero-headline .flip-cursor {
  color: var(--cyan-500);
  font-weight: 800;
  margin-left: -0.15em;
  animation: cursor-blink 1.1s steps(2,end) infinite;
}
.hero-headline .flip-word {
  position: absolute;
  inset: 0;
  display: block;
  background: linear-gradient(115deg, var(--cyan-600) 0%, var(--navy-800) 70%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 800;
  font-style: italic;
  transform: translateY(110%);
  opacity: 0;
  transition: transform .55s cubic-bezier(.6,.1,.2,1), opacity .35s ease;
  white-space: nowrap;
}
.hero-headline .flip-word.is-active {
  transform: translateY(0);
  opacity: 1;
}
.hero-headline .flip-word.is-prev {
  transform: translateY(-110%);
  opacity: 0;
}
.hero-headline .flip-cursor.legacy-cursor { display:none; }
@keyframes cursor-blink { 50% { opacity: 0; } }

.hero-headline .accent-line {
  margin-top: 0.18em;
  font-size: 0.62em;
  letter-spacing: -0.025em;
  color: var(--navy-800);
  font-weight: 700;
  display: flex;
  align-items: baseline;
  gap: 0.6em;
  flex-wrap: wrap;
}
.hero-headline .accent-tag {
  display: inline-block;
  padding: 0.22em 0.55em;
  background: linear-gradient(115deg, #fef3c7 0%, #fde68a 100%);
  color: #78350f;
  font-weight: 600;
  font-style: italic;
  font-size: 0.78em;
  border-radius: 6px;
  transform: rotate(-1.5deg);
  box-shadow: 0 1px 0 rgba(0,0,0,0.04);
}

.hero-headline .accent {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 0.18em;
  font-size: 0.62em;
  letter-spacing: -0.025em;
  color: var(--navy-800);
  font-weight: 700;
}
.hero-headline .accent-divider {
  flex: 0 0 36px;
  height: 3px;
  background: linear-gradient(90deg, var(--cyan-500), transparent);
  border-radius: 2px;
}
.hero-headline .accent-mute {
  color: var(--ink-400);
  font-weight: 500;
  font-style: italic;
}

/* Live status strip above hero */
.hero-status-strip {
  position: relative;
  z-index: 2;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.hero-status-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.86rem;
  color: var(--ink-700);
  flex-wrap: nowrap;
  white-space: nowrap;
  overflow: hidden;
}
.hero-status-inner .live-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hero-status-inner .live-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #ef4444;
  box-shadow: 0 0 0 0 rgba(239,68,68,0.55);
  animation: pulse-red 1.6s infinite;
  flex-shrink: 0;
}
@keyframes pulse-red {
  0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.55); }
  70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}
.hero-status-inner .live-text b {
  color: var(--ink-900);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.hero-status-inner .live-sep { color: var(--ink-300); }
.hero-status-inner .muted { color: var(--ink-500); }

.counter-num {
  display: inline-block;
  font-variant-numeric: tabular-nums;
}

/* Grid floor — perspective lines fading down */
.hero-bg .grid-floor {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(21,78,138,0.07) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(21,78,138,0.07) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 30%, transparent 80%);
  opacity: 0.9;
}

/* Proof stats row replacing hero-meta */
.hero-proof {
  margin-top: 38px;
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 22px 26px;
  background: linear-gradient(180deg, #fff 0%, #f6f9fd 100%);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, var(--shadow-sm);
  max-width: 560px;
}
.hero-proof .proof-stat { flex: 1; min-width: 0; }
.hero-proof .proof-num {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--navy-800);
  line-height: 1;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.hero-proof .proof-num .unit {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--cyan-600);
  letter-spacing: 0;
}
.hero-proof .proof-label {
  margin-top: 6px;
  font-size: 0.78rem;
  color: var(--ink-500);
  letter-spacing: 0.02em;
}
.hero-proof .proof-divider {
  width: 1px;
  height: 36px;
  background: var(--line);
  flex: 0 0 1px;
}

@media (max-width: 720px) {
  .hero-proof {
    padding: 18px;
    gap: 14px;
    flex-wrap: wrap;
  }
  .hero-proof .proof-divider { display: none; }
  .hero-proof .proof-stat { flex: 1 1 30%; }
  .hero-headline .line-flip { white-space: normal; }
}

/* legacy fallback (unused old rules) */
.hero h1.legacy-h1 {
  margin-top: 22px;
  font-size: clamp(2.4rem, 6.4vw, 5rem);
  font-weight: 600;
  line-height: 1.0;
  letter-spacing: -0.035em;
}
.hero h1 .strike {
  position: relative;
  color: var(--ink-400);
  font-style: italic;
  font-weight: 400;
}
.hero h1 .strike::after {
  content: "";
  position: absolute;
  left: -2%;
  right: -2%;
  top: 52%;
  height: 4px;
  background: var(--cyan-500);
  border-radius: 4px;
  transform: rotate(-2deg);
}
.hero h1 .accent {
  background: linear-gradient(120deg, var(--navy-800) 0%, var(--cyan-500) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.hero-sub {
  margin-top: 22px;
  font-size: 1.12rem;
  color: var(--ink-500);
  max-width: 52ch;
  line-height: 1.55;
}
.hero-sub b { color: var(--ink-900); font-weight: 500; }

.hero-actions {
  margin-top: 30px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.hero-meta {
  margin-top: 28px;
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 0.85rem;
  color: var(--ink-500);
}
.hero-meta .check::before {
  content: "✓";
  display: inline-block;
  width: 18px;
  height: 18px;
  line-height: 18px;
  text-align: center;
  background: var(--success);
  color: #fff;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 700;
  margin-right: 7px;
}

/* Hero visual: phone with chat */
.hero-visual {
  position: relative;
  display: flex;
  justify-content: center;
}
.phone {
  width: 320px;
  background: linear-gradient(180deg, #0d192c, #1a2942);
  border-radius: 38px;
  padding: 12px;
  box-shadow:
    0 30px 60px -25px rgba(16,58,108,0.45),
    0 18px 35px -12px rgba(16,58,108,0.18),
    inset 0 0 0 1px rgba(255,255,255,0.06);
  position: relative;
}
.phone::before {
  content: "";
  position: absolute;
  top: 18px; left: 50%;
  transform: translateX(-50%);
  width: 110px; height: 26px;
  background: #050a14;
  border-radius: 16px;
  z-index: 2;
}
.phone-screen {
  background: #f4f7fb;
  border-radius: 28px;
  padding: 56px 14px 18px;
  height: 580px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}
.phone-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 4px 12px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 14px;
}
.phone-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy-700), var(--cyan-500));
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 0.85rem;
  flex-shrink: 0;
}
.phone-name {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--ink-900);
}
.phone-status {
  font-size: 0.72rem;
  color: var(--success);
  display: flex;
  align-items: center;
  gap: 5px;
}
.phone-status::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
}
.chat-stream {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 4px 2px;
}
.bubble {
  max-width: 78%;
  padding: 9px 13px;
  border-radius: 16px;
  font-size: 0.86rem;
  line-height: 1.4;
  animation: bubbleIn .35s ease both;
}
.bubble.user {
  align-self: flex-end;
  background: #d9f3e0;
  color: #093824;
  border-bottom-right-radius: 4px;
}
.bubble.bot {
  align-self: flex-start;
  background: #fff;
  color: var(--ink-900);
  border: 1px solid var(--line);
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
.bubble .meta {
  display: block;
  margin-top: 4px;
  font-size: 0.66rem;
  color: var(--ink-400);
}
.bubble.bot.typing {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 12px 14px;
}
.bubble.bot.typing .d {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink-400);
  animation: typing 1.2s infinite;
}
.bubble.bot.typing .d:nth-child(2) { animation-delay: .2s; }
.bubble.bot.typing .d:nth-child(3) { animation-delay: .4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-3px); opacity: 1; }
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Floating cards around phone */
.floater {
  position: absolute;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 14px;
  font-size: 0.82rem;
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 3;
  animation: float 4s ease-in-out infinite;
}
.floater .ic {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.floater .lbl { font-size: 0.7rem; color: var(--ink-400); }
.floater .val { font-weight: 600; color: var(--ink-900); }
.floater.f1 { top: 16%; left: -32px; animation-delay: 0s; }
.floater.f2 { bottom: 22%; right: -36px; animation-delay: 1.5s; }
.floater.f3 { bottom: -8px; left: 8%; animation-delay: 2.6s; }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@media (max-width: 540px) {
  .phone { width: 290px; }
  .phone-screen { height: 520px; }
  .floater.f1 { left: -10px; }
  .floater.f2 { right: -10px; }
}

/* ---------- Marquee logos ---------- */
.marquee {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
  padding: 26px 0;
  overflow: hidden;
}
.marquee-label {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-400);
  margin-bottom: 18px;
}
.marquee-track {
  display: flex;
  gap: 56px;
  width: max-content;
  animation: scrollX 28s linear infinite;
  align-items: center;
}
.marquee:hover .marquee-track { animation-play-state: paused; }
.marquee-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.05rem;
  color: var(--ink-500);
  white-space: nowrap;
}
.marquee-item .ic-stack {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 0.75rem;
  font-weight: 700;
}
@keyframes scrollX {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ---------- Services ---------- */
.services-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
  margin-top: 48px;
}
.svc {
  grid-column: span 4;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 28px;
  position: relative;
  overflow: hidden;
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s;
}
.svc:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--line-strong);
}
.svc.feature {
  grid-column: span 8;
  background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
  color: #fff;
  border-color: transparent;
}
.svc.feature h3, .svc.feature p { color: #fff; }
.svc.feature .svc-meta { color: rgba(255,255,255,0.7); }
.svc.feature .ico { background: rgba(255,255,255,0.12); color: var(--cyan-400); border-color: rgba(255,255,255,0.18); }

@media (max-width: 920px) {
  .svc, .svc.feature { grid-column: span 12; }
}
@media (min-width: 921px) and (max-width: 1100px) {
  .svc { grid-column: span 6; }
  .svc.feature { grid-column: span 12; }
}

.ico {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--bg-tint);
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--navy-700);
  margin-bottom: 18px;
}
.svc h3 {
  font-size: 1.25rem;
  margin-bottom: 8px;
}
.svc p {
  color: var(--ink-500);
  font-size: 0.95rem;
  line-height: 1.55;
}
.svc-meta {
  margin-top: 18px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.svc-meta .chip {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  background: rgba(15,23,42,0.04);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--ink-500);
}
.svc.feature .svc-meta .chip {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.16);
  color: rgba(255,255,255,0.85);
}

/* Feature card content */
.feature-art {
  margin-top: 22px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.18);
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: rgba(255,255,255,0.7);
  display: grid;
  gap: 8px;
}
.feature-art .row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
}
.feature-art .row .b { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan-400); }
.feature-art .row .arrow { margin-left: auto; opacity: 0.6; }

/* ---------- Demo Chatbot interactive ---------- */
.demo-wrap {
  margin-top: 48px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  align-items: stretch;
}
@media (max-width: 920px) { .demo-wrap { grid-template-columns: 1fr; } }

.demo-side {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 32px;
  display: flex;
  flex-direction: column;
}
.demo-side h3 {
  font-size: 1.6rem;
  margin-bottom: 12px;
}
.demo-side p {
  color: var(--ink-500);
  margin-bottom: 24px;
}
.scenario-list {
  list-style: none;
  padding: 0;
  margin: 0 0 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.scenario-list button {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  text-align: left;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: var(--bg);
  font-size: 0.92rem;
  color: var(--ink-700);
  transition: all .15s;
}
.scenario-list button:hover { border-color: var(--line-strong); background: var(--bg-tint); }
.scenario-list button.active {
  background: var(--ink-900);
  color: #fff;
  border-color: var(--ink-900);
}
.scenario-list button .num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--bg-tint);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-500);
  flex-shrink: 0;
}
.scenario-list button.active .num {
  background: rgba(255,255,255,0.18);
  color: #fff;
}

.demo-stage {
  background: linear-gradient(180deg, var(--navy-900), var(--navy-800));
  border-radius: var(--r-lg);
  padding: 32px;
  position: relative;
  overflow: hidden;
  min-height: 540px;
  display: flex;
  flex-direction: column;
}
.demo-stage::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  opacity: 0.6;
}
.demo-phone {
  position: relative;
  z-index: 1;
  margin: 0 auto;
  width: 290px;
  background: #0d192c;
  border-radius: 36px;
  padding: 10px;
  box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.06);
}
.demo-phone .phone-screen {
  background: #ece5dd;
  border-radius: 28px;
  padding: 50px 12px 16px;
  height: 510px;
}
.demo-phone .phone-header {
  background: #075e54;
  margin: -50px -12px 12px;
  padding: 38px 14px 10px;
  border-radius: 28px 28px 0 0;
  border-bottom: 0;
  color: #fff;
}
.demo-phone .phone-name { color: #fff; }
.demo-phone .phone-status { color: rgba(255,255,255,0.8); }
.demo-phone .phone-status::before { background: rgba(255,255,255,0.8); }
.demo-phone .chat-stream {
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4) 1px, transparent 1px),
    radial-gradient(circle at 80% 60%, rgba(0,0,0,0.04) 1px, transparent 1px);
  background-size: 30px 30px;
}
.demo-phone .input-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: #fff;
  border-radius: 22px;
  margin-top: 8px;
}
.demo-phone .input-bar input {
  flex: 1;
  border: 0;
  outline: 0;
  font-size: 0.85rem;
  color: var(--ink-900);
  background: transparent;
  font-family: inherit;
}
.demo-phone .input-bar button {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: #25d366;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
}

.suggested-replies {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.suggested-replies button {
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.85);
  border: 1px solid var(--line);
  font-size: 0.76rem;
  color: var(--navy-800);
  font-weight: 500;
  transition: all .15s;
}
.suggested-replies button:hover { background: #fff; transform: translateY(-1px); }

/* ---------- Cases ---------- */
.case-grid {
  margin-top: 48px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}
@media (max-width: 820px) { .case-grid { grid-template-columns: 1fr; } }

.case {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  transition: all .25s;
}
.case:hover {
  border-color: var(--line-strong);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.case-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-500);
}
.case-tag .swatch {
  width: 10px; height: 10px;
  border-radius: 3px;
}
.case h3 {
  font-size: 1.4rem;
  letter-spacing: -0.02em;
}
.case-result {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  padding: 16px 0;
  border-top: 1px solid var(--line);
}
.case-result .stat strong {
  display: block;
  font-family: var(--font-display);
  font-size: 1.65rem;
  font-weight: 600;
  color: var(--navy-800);
  letter-spacing: -0.02em;
}
.case-result .stat span {
  font-size: 0.78rem;
  color: var(--ink-500);
}
.case-art {
  background: var(--bg-tint);
  border-radius: 12px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--line);
}

/* ---------- Testimonials ---------- */
.testi-grid {
  margin-top: 48px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
@media (max-width: 920px) { .testi-grid { grid-template-columns: 1fr; } }

.testi {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.stars {
  display: flex;
  gap: 2px;
  color: #f59e0b;
  font-size: 1rem;
}
.testi blockquote {
  margin: 0;
  font-size: 1rem;
  line-height: 1.55;
  color: var(--ink-900);
  font-weight: 400;
  flex: 1;
}
.testi-author {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
.testi-author .av {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy-700), var(--cyan-500));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
}
.testi-author .name { font-weight: 600; font-size: 0.9rem; color: var(--ink-900); }
.testi-author .role { font-size: 0.78rem; color: var(--ink-500); }

/* ---------- Pricing ---------- */
.pricing-grid {
  margin-top: 48px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  align-items: stretch;
}
@media (max-width: 920px) { .pricing-grid { grid-template-columns: 1fr; } }

.plan {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  position: relative;
  transition: all .25s;
}
.plan:hover { border-color: var(--line-strong); box-shadow: var(--shadow-md); }
.plan.featured {
  background: linear-gradient(160deg, var(--navy-900), var(--navy-700));
  border-color: transparent;
  color: #fff;
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
}
.plan.featured h3, .plan.featured .price-num { color: #fff; }
.plan.featured ul li { color: rgba(255,255,255,0.85); }
.plan.featured ul li::before { background: var(--cyan-400); border-color: var(--cyan-400); }
.plan.featured .price-curr, .plan.featured .price-period { color: rgba(255,255,255,0.65); }
.plan.featured .plan-desc { color: rgba(255,255,255,0.7); }

.plan-tag {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-500);
}
.plan.featured .plan-tag { color: var(--cyan-400); }
.plan-badge {
  position: absolute;
  top: -12px;
  left: 32px;
  background: var(--cyan-500);
  color: #062130;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 999px;
}
.plan h3 {
  font-size: 1.4rem;
  letter-spacing: -0.02em;
}
.plan-desc { font-size: 0.92rem; color: var(--ink-500); }
.price {
  display: flex;
  align-items: baseline;
  gap: 4px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}
.plan.featured .price { border-bottom-color: rgba(255,255,255,0.18); }
.price-curr { font-size: 1rem; color: var(--ink-500); }
.price-num {
  font-family: var(--font-display);
  font-size: 2.6rem;
  font-weight: 600;
  color: var(--ink-900);
  letter-spacing: -0.03em;
}
.price-period { font-size: 0.92rem; color: var(--ink-500); }

.plan ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-size: 0.92rem;
  flex: 1;
}
.plan ul li {
  position: relative;
  padding-left: 24px;
  color: var(--ink-700);
  line-height: 1.5;
}
.plan ul li::before {
  content: "";
  position: absolute;
  left: 0; top: 6px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--cyan-500);
  border: 1px solid var(--cyan-500);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' width='12' height='12'><path d='M3 6.5l2 2 4-4.5' stroke='white' fill='none' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat;
  background-position: center;
}

/* ---------- Process ---------- */
.process {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 48px;
  position: relative;
}
@media (max-width: 820px) { .process { grid-template-columns: 1fr 1fr; } }
@media (max-width: 520px) { .process { grid-template-columns: 1fr; } }

.step {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 24px;
  position: relative;
}
.step .num {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--cyan-600);
  font-weight: 600;
  letter-spacing: 0.08em;
}
.step h4 {
  margin-top: 14px;
  font-size: 1.05rem;
  font-weight: 600;
}
.step p { font-size: 0.9rem; color: var(--ink-500); margin-top: 8px; line-height: 1.5; }

/* ---------- FAQ ---------- */
.faq {
  margin-top: 36px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 760px;
}
.faq-item {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  overflow: hidden;
}
.faq-item summary {
  list-style: none;
  cursor: pointer;
  padding: 20px 24px;
  font-weight: 500;
  font-size: 1rem;
  color: var(--ink-900);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.faq-item summary::-webkit-details-marker { display: none; }
.faq-item summary::after {
  content: "+";
  font-size: 1.4rem;
  color: var(--ink-500);
  transition: transform .2s;
}
.faq-item[open] summary::after { content: "−"; }
.faq-item .body {
  padding: 0 24px 22px;
  color: var(--ink-500);
  font-size: 0.95rem;
  line-height: 1.6;
}

/* ---------- CTA ---------- */
.cta-section {
  padding: clamp(60px, 8vw, 110px) 0;
}
.cta-box {
  background: linear-gradient(140deg, var(--navy-900) 0%, var(--navy-700) 50%, var(--cyan-600) 130%);
  border-radius: 28px;
  padding: clamp(40px, 6vw, 72px);
  color: #fff;
  position: relative;
  overflow: hidden;
}
.cta-box::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(circle at 70% 30%, #000 0%, transparent 70%);
  pointer-events: none;
}
.cta-box::after {
  content: "";
  position: absolute;
  width: 380px; height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(25,184,212,0.35), transparent 70%);
  bottom: -150px; right: -120px;
  filter: blur(60px);
  pointer-events: none;
}
.cta-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 36px;
  align-items: center;
  position: relative;
  z-index: 1;
}
@media (max-width: 820px) { .cta-grid { grid-template-columns: 1fr; } }

.cta-grid h2 {
  color: #fff;
  font-size: clamp(1.8rem, 3.6vw, 2.8rem);
  letter-spacing: -0.03em;
}
.cta-grid p {
  margin-top: 16px;
  color: rgba(255,255,255,0.78);
  font-size: 1.05rem;
  max-width: 48ch;
}
.cta-actions {
  margin-top: 28px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.cta-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.14);
  backdrop-filter: blur(14px);
  border-radius: 16px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.cta-card .row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.92rem;
  color: rgba(255,255,255,0.92);
}
.cta-card .row .ic {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ----------------------- Reveal hook -----------------------
function useReveal() {
  useEffect(() => {
    const fireAll = () => document.querySelectorAll(".reveal:not(.in)").forEach(el => el.classList.add("in"));
    if (!("IntersectionObserver" in window)) { fireAll(); return; }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.05, rootMargin: "0px 0px -5% 0px" });
    document.querySelectorAll(".reveal").forEach(el => io.observe(el));
    // Safety: if anything is still hidden after 1.2s, force-show it
    const t = setTimeout(fireAll, 1200);
    return () => { clearTimeout(t); io.disconnect(); };
  }, []);
}

function DemoChatbot() {
  const [active, setActive] = useStateD(0);
  const [messages, setMessages] = useStateD([]);     // [{idx, from, text}]
  const [currentNode, setCurrentNode] = useStateD("start");
  const [typing, setTyping] = useStateD(false);
  const [waitingChoice, setWaitingChoice] = useStateD(false);
  const [inputVal, setInputVal] = useStateD("");
  const streamRef = useRefD(null);
  const idRef = useRefD(0);
  const scenario = SCENARIOS[active];

  // Reset on scenario change
  useEffectD(() => {
    idRef.current = 0;
    setMessages([]);
    setTyping(false);
    setWaitingChoice(false);
    setCurrentNode("start");
  }, [active]);

  // Walk the conversation tree from currentNode
  useEffectD(() => {
    if (!currentNode) {
      // End of flow → restart after pause
      const t = setTimeout(() => {
        idRef.current = 0;
        setMessages([]);
        setCurrentNode("start");
      }, 5000);
      return () => clearTimeout(t);
    }
    const node = scenario.nodes[currentNode];
    if (!node) return;

    if (node.from === "bot") {
      // typing indicator, then push message
      setTyping(true);
      const t1 = setTimeout(() => {
        setTyping(false);
        const id = ++idRef.current;
        setMessages(m => [...m, { idx: id, from: "bot", text: node.text }]);
        if (node.suggestions) {
          setWaitingChoice(true);
        } else {
          // auto-advance
          setTimeout(() => setCurrentNode(node.next), 700);
        }
      }, 1100);
      return () => clearTimeout(t1);
    } else {
      // user message — auto unless suggestions (suggestions only on bot in our model)
      const t = setTimeout(() => {
        const id = ++idRef.current;
        setMessages(m => [...m, { idx: id, from: "user", text: node.text }]);
        setTimeout(() => setCurrentNode(node.next), 600);
      }, 900);
      return () => clearTimeout(t);
    }
  }, [currentNode, active]);

  useEffectD(() => {
    if (streamRef.current) streamRef.current.scrollTop = streamRef.current.scrollHeight;
  }, [messages, typing]);

  const onPickSuggestion = (sug) => {
    if (!waitingChoice) return;
    setWaitingChoice(false);
    // immediately push the user choice as a message,
    // then jump to its `next` node (which will continue the flow)
    const id = ++idRef.current;
    setMessages(m => [...m, { idx: id, from: "user", text: sug.label }]);
    setTimeout(() => {
      // The chosen `next` may be a user node (echo of choice) or directly a bot node.
      // If it's a user node with the same text, skip its auto-render to avoid duplicate.
      const target = scenario.nodes[sug.next];
      if (target && target.from === "user" && target.text === sug.label) {
        setCurrentNode(target.next);
      } else {
        setCurrentNode(sug.next);
      }
    }, 400);
  };

  const node = scenario.nodes[currentNode];
  const showSuggestions = waitingChoice && node && node.suggestions;

  return (

function useRotator(items, intervalMs = 2400) {
  const [i, setI] = useStateA(0);
  useEffectA(() => {
    const t = setInterval(() => setI((x) => (x + 1) % items.length), intervalMs);
    return () => clearInterval(t);
  }, [items.length, intervalMs]);
  return [items[i], i];
}

function LiveCounter({ from = 1247, perSecond = 0.6 }) {
  const [n, setN] = useStateA(from);
  useEffectA(() => {
    const t = setInterval(() => setN((x) => x + 1), Math.round(1000 / perSecond));
    return () => clearInterval(t);
  }, [perSecond]);
  return <span className="counter-num">{n.toLocaleString("pt-BR")}</span>;
}

/* global React, ReactDOM, useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle, TweakColor */
const { useEffect: useEffectM } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroVariant": "bold",
  "theme": "light",
  "density": "default",
  "primaryHue": 218
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useReveal();

  useEffectM(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.dataset.density = tweaks.density;
    // primary hue tweak: shift navy + cyan together
    const root = document.documentElement;
    const h = tweaks.primaryHue;
    if (h !== 218) {
      root.style.setProperty("--navy-900", `hsl(${h}, 75%, 14%)`);
      root.style.setProperty("--navy-800", `hsl(${h}, 70%, 24%)`);
      root.style.setProperty("--navy-700", `hsl(${h}, 70%, 31%)`);
      root.style.setProperty("--cyan-600", `hsl(${(h+4)%360}, 78%, 41%)`);
      root.style.setProperty("--cyan-500", `hsl(${(h+8)%360}, 80%, 47%)`);
      root.style.setProperty("--cyan-400", `hsl(${(h+12)%360}, 80%, 56%)`);
    } else {
      root.style.removeProperty("--navy-900");
      root.style.removeProperty("--navy-800");
      root.style.removeProperty("--navy-700");
      root.style.removeProperty("--cyan-600");
      root.style.removeProperty("--cyan-500");
      root.style.removeProperty("--cyan-400");
    }
  }, [tweaks]);

  return (
    <>
      <NavBar tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <Marquee />
      <Services />
      <Demo />
      <Cases />
      <Testimonials />
      <Process />
      <FAQ />
      <CTA />
      <Footer />
      <WAFloat />

      <TweaksPanel title="Tweaks · Tráfego Tech">
        <TweakSection title="Hero">
          <TweakRadio
            label="Variante de manchete"
            value={tweaks.heroVariant}
            onChange={(v) => setTweak("heroVariant", v)}
            options={[
              { value: "bold", label: "Provocador" },
              { value: "direct", label: "Direto" },
              { value: "story", label: "Narrativo" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Aparência">
          <TweakRadio
            label="Tema"
            value={tweaks.theme}
            onChange={(v) => setTweak("theme", v)}
            options={[
              { value: "light", label: "Light" },
              { value: "dark", label: "Dark" },
            ]}
          />
          <TweakRadio
            label="Densidade"
            value={tweaks.density}
            onChange={(v) => setTweak("density", v)}
            options={[
              { value: "compact", label: "Compacto" },
              { value: "default", label: "Padrão" },
              { value: "spacious", label: "Espaçoso" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Cor primária">
          <input
            type="range"
            min="180"
            max="280"
            step="2"
            value={tweaks.primaryHue}
            onChange={(e) => setTweak("primaryHue", parseInt(e.target.value, 10))}
            style={{width: "100%"}}
          />
          <div style={{fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--ink-400)", marginTop: 4}}>
            hue: {tweaks.primaryHue}°
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App />);

</script>
